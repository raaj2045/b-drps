# Config for EchidnaAuthGuarded: whitelist only the guarded wrappers so the
# raw inherited addOrRequestMember/denyRequest are not fuzzed directly. This
# isolates the denyRequest data-loss path the ghost-count invariant targets.
testMode: property
testLimit: 50000
seqLen: 50
seed: 1
sender: ["0x10000", "0x20000", "0x30000", "0x40000"]
corpusDir: benchmarks/echidna-corpus-guarded
filterBlacklist: false
filterFunctions:
  - "EchidnaAuthGuarded.reqUser()"
  - "EchidnaAuthGuarded.denyUser(uint8)"
